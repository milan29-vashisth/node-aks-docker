apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-docker-aks

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-docker-aks

  template:
    metadata:
      labels:
        app: node-docker-aks

    spec:
      containers:
      - name: node-docker-aks
        image: nodeacr98y0j.azurecr.io/node-docker-aks:440

        ports:
        - containerPort: 3000