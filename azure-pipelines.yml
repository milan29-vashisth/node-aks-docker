trigger:
  batch: true
  branches:
    include:
      - main

# ❗ IMPORTANT: use your self-hosted agent pool
pool:
  name: Default   # 🔥 change this to your actual agent pool name

variables:
  imageRepository: node-aks-app
  dockerfilePath: app/Dockerfile
  buildContext: app
  tag: $(Build.BuildId)

  # Terraform variables
  TF_VAR_resource_group_name: "tfstate-rg"
  TF_VAR_location: "East US"
  TF_VAR_acr_name: "noderegistrydemo12345"
  TF_VAR_vm_name: "node-vm"
  TF_VAR_vm_size: "Standard_B1s"
  TF_VAR_vm_admin_username: "azureuser"
  TF_VAR_vm_admin_password: "StrongPass@123!"
  TF_VAR_dns_label: "nodevm12345"

stages:

# ==========================================
# STAGE 1 - TERRAFORM
# ==========================================
- stage: TerraformInfra
  displayName: Terraform Infrastructure

  jobs:
    - job: Terraform
      steps:
        - checkout: self

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: latest

        - task: TerraformTaskV4@4
          displayName: Terraform Init
          inputs:
            provider: azurerm
            command: init
            backendServiceArm: 'azure-rm-service-connection'
            backendAzureRmResourceGroupName: 'tf-backend-rg'
            backendAzureRmStorageAccountName: 'tfstatestorage292929'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'acr-terraform.tfstate'
            workingDirectory: infra

        - task: TerraformTaskV4@4
          displayName: Terraform Apply
          inputs:
            provider: azurerm
            command: apply
            workingDirectory: infra
            environmentServiceNameAzureRM: 'azure-rm-service-connection'
            args: '-auto-approve -lock-timeout=10m'

# ==========================================
# STAGE 2 - DOCKER BUILD + RUN ON VM
# ==========================================
- stage: DockerDeploy
  displayName: Build & Run on Self-Hosted VM
  dependsOn: TerraformInfra

  jobs:
    - job: Deploy
      steps:
        - checkout: self

        # 🔥 Login to ACR using Azure CLI (BEST for self-hosted)
        - task: AzureCLI@2
          displayName: ACR Login
          inputs:
            azureSubscription: 'azure-rm-service-connection'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name noderegistrydemo12345

        # 🔥 Build image locally on VM
        - script: |
            docker build -t noderegistrydemo12345.azurecr.io/node-aks-app:$(tag) -f app/Dockerfile app
          displayName: Build Docker Image

        # 🔥 Push to ACR
        - script: |
            docker push noderegistrydemo12345.azurecr.io/node-aks-app:$(tag)
          displayName: Push Image to ACR

        # 🔥 Run container directly on SAME VM (your agent machine)
        - script: |
            docker stop nodeapp || true
            docker rm nodeapp || true
            docker run -d -p 80:3000 --name nodeapp noderegistrydemo12345.azurecr.io/node-aks-app:$(tag)
          displayName: Run Container on VM