trigger:
  batch: true
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: node-aks-app
  dockerfilePath: app/Dockerfile
  buildContext: app
  tag: $(Build.BuildId)

stages:

# ==========================================
# STAGE 1 - TERRAFORM INFRA (SAFE)
# ==========================================
- stage: TerraformInfra
  displayName: Terraform Infrastructure

  jobs:
    - job: Terraform
      displayName: Terraform Init Plan Apply

      steps:
        - checkout: self

        # Install Terraform
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: latest

        # INIT (Backend configured)
        - task: TerraformTaskV4@4
          displayName: Terraform Init
          inputs:
            provider: azurerm
            command: init
            backendServiceArm: 'azure-rm-service-connection'
            backendAzureRmResourceGroupName: 'tf-backend-rg'
            backendAzureRmStorageAccountName: 'tfstatestorage292929'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'acr-terraform.tfstate'
            workingDirectory: infra

        # PLAN
        - task: TerraformTaskV4@4
          displayName: Terraform Plan
          inputs:
            provider: azurerm
            command: plan
            workingDirectory: infra
            environmentServiceNameAzureRM: 'azure-rm-service-connection'

        # APPLY (safe with lock timeout)
        - task: TerraformTaskV4@4
          displayName: Terraform Apply
          inputs:
            provider: azurerm
            command: apply
            workingDirectory: infra
            environmentServiceNameAzureRM: 'azure-rm-service-connection'
            args: '-auto-approve -lock-timeout=5m'

# ==========================================
# STAGE 2 - DOCKER BUILD & PUSH TO ACR
# ==========================================
- stage: DockerBuildPush
  displayName: Build and Push Docker Image
  dependsOn: TerraformInfra

  jobs:
    - job: Docker
      displayName: Docker Build Push

      steps:
        - checkout: self

        - task: Docker@2
          displayName: Build and Push to ACR
          inputs:
            command: buildAndPush
            containerRegistry: 'acr-service-connection-milan'
            repository: '$(imageRepository)'
            Dockerfile: '$(dockerfilePath)'
            buildContext: '$(buildContext)'
            tags: |
              $(tag)
              latest